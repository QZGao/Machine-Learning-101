<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 290" font-family="-apple-system, 'Segoe UI', Arial, sans-serif">
  <rect width="780" height="290" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="390" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">When to Use CPU vs. GPU Nodes</text>

  <!-- CPU -->
  <rect x="20" y="50" width="360" height="224" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="20" y="50" width="360" height="32" rx="10" fill="#3b82f6"/>
  <text x="200" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">CPU Nodes</text>
  <text x="36" y="104" font-size="12" font-weight="600" fill="#1e40af">Partitions: short, courses</text>
  <text x="36" y="130" font-size="11" fill="#334155">Good for:</text>
  <text x="50" y="150" font-size="11" fill="#475569">&#x2713; Data preprocessing (pandas, numpy)</text>
  <text x="50" y="170" font-size="11" fill="#475569">&#x2713; Feature engineering</text>
  <text x="50" y="190" font-size="11" fill="#475569">&#x2713; Classical ML (scikit-learn, XGBoost)</text>
  <text x="50" y="210" font-size="11" fill="#475569">&#x2713; Small-scale experiments</text>
  <rect x="36" y="226" width="328" height="24" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="200" y="243" text-anchor="middle" font-size="10" fill="#1e40af">Shorter queue wait  |  Up to 48h runtime</text>

  <!-- GPU -->
  <rect x="400" y="50" width="360" height="224" rx="10" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
  <rect x="400" y="50" width="360" height="32" rx="10" fill="#10b981"/>
  <text x="580" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">GPU Nodes</text>
  <text x="416" y="104" font-size="12" font-weight="600" fill="#065f46">Partitions: gpu, gpu-short, courses-gpu</text>
  <text x="416" y="130" font-size="11" fill="#334155">Good for:</text>
  <text x="430" y="150" font-size="11" fill="#475569">&#x2713; Neural network training (PyTorch)</text>
  <text x="430" y="170" font-size="11" fill="#475569">&#x2713; Deep learning inference</text>
  <text x="430" y="190" font-size="11" fill="#475569">&#x2713; Matrix-heavy computation</text>
  <text x="430" y="210" font-size="11" fill="#475569">&#x2713; Transformers, CNNs, RNNs</text>
  <rect x="416" y="226" width="328" height="24" rx="5" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="580" y="243" text-anchor="middle" font-size="10" fill="#065f46">H200 / A100 / V100  |  Up to 8h runtime</text>
</svg>
